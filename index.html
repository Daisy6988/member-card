<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>會員表揚卡</title>
  
  <style>
    /* 基礎外觀設定 */
    body {
      font-family: "Georgia", "Times New Roman", "Microsoft JhengHei", serif;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
      margin: 0;
    }
    
    h1 { 
      color: #f3cd7b;
      font-size: 2.2rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      margin-bottom: 25px;
    }
    
    .container {
      display: flex;
      background: #ffffff;
      padding: 35px;
      border-radius: 20px;
      gap: 50px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      max-width: 850px;
      width: 100%;
      box-sizing: border-box;
    }
    
    .form-section, .preview-section { 
      width: 350px; 
    }
    
    h2 {
      color: #1e293b;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 10px;
      margin-top: 0;
    }
    
    .form-group { 
      margin-bottom: 18px; 
    }
    
    /* 普通文字輸入框的標籤（強迫換行） */
    .form-group label { 
      display: block; 
      margin-bottom: 6px; 
      font-weight: bold;
      color: #475569;
    }
    
    /* ✨ 修正：專屬於 Checkbox 的標籤樣式（橫向排列且置中對齊） */
    .form-section .checkbox-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-weight: bold;
      color: #334155;
      margin-top: 12px;
    }
    
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 14px;
    }

    /* 讓勾選框方塊變大好點選 */
    .form-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0;
      cursor: pointer;
    }

    .hint-text {
      color: #94a3b8; 
      text-align: center; 
      margin-top: 80px;
      font-style: italic;
      font-size: 0.95rem;
    }

    /* ========================================================
       【重頭戲：卡片三色等級與古典樣式】
       ======================================================== */
    .invite-card {
      position: relative;
      border-radius: 12px;
      padding: 40px 25px;
      text-align: center;
      box-sizing: border-box;
      transition: all 0.4s ease;
      outline-offset: -12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    /* 🎨 銅牌會員：土黃色質感 */
    .invite-card.銅牌會員 {
      border: 4px double #b45309;
      outline: 1px solid #d97706;
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
    }
    .invite-card.銅牌會員 .card-name { color: #78350f; }
    .invite-card.銅牌會員 .card-line, 
    .invite-card.銅牌會員 .avatar { border-color: #b45309; }
    .invite-card.銅牌會員 .card-line::after { background: #fde68a; color: #b45309; }
    .invite-card.銅牌會員::before, .invite-card.銅牌會員::after { color: #b45309; }
    .invite-card.銅牌會員 .detail-box { background-color: rgba(180, 83, 9, 0.08); border-left: 4px solid #b45309; }

    /* 🎨 銀牌會員：銀白色質感 */
    .invite-card.銀牌會員 {
      border: 4px double #475569;
      outline: 1px solid #94a3b8;
      background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
    }
    .invite-card.銀牌會員 .card-name { color: #1e293b; }
    .invite-card.銀牌會員 .card-line, 
    .invite-card.銀牌會員 .avatar { border-color: #475569; }
    .invite-card.銀牌會員 .card-line::after { background: #cbd5e1; color: #475569; }
    .invite-card.銀牌會員::before, .invite-card.銀牌會員::after { color: #475569; }
    .invite-card.銀牌會員 .detail-box { background-color: rgba(71, 85, 105, 0.08); border-left: 4px solid #475569; }

    /* 🎨 金牌會員：金黃色質感 */
    .invite-card.金牌會員 {
      border: 4px double #b48a1d;
      outline: 1px solid #d4af37;
      background: linear-gradient(135deg, #fffdf2 0%, #fbf4d0 100%);
    }
    .invite-card.金牌會員 .card-name { color: #855832; }
    .invite-card.金牌會員 .card-line, 
    .invite-card.金牌會員 .avatar { border-color: #b48a1d; }
    .invite-card.金牌會員 .card-line::after { background: #fbf4d0; color: #b48a1d; }
    .invite-card.金牌會員::before, .invite-card.金牌會員::after { color: #b48a1d; }
    .invite-card.金牌會員 .detail-box { background-color: rgba(212, 175, 55, 0.12); border-left: 4px solid #d4af37; }

    /* ✨ VIP 模式啟動：疊加額外的金色流光與陰影 */
    .invite-card.vip {
      box-shadow: 0 15px 35px rgba(212, 175, 55, 0.5);
      filter: contrast(1.05);
    }

    /* 共通裝飾設定 */
    .invite-card::before, .invite-card::after {
      content: "⚜️";
      position: absolute;
      top: 15px;
      font-size: 14px;
    }
    .invite-card::before { left: 15px; }
    .invite-card::after { right: 15px; }

    .avatar {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }

    .card-name {
      font-family: "Times New Roman", "王漢宗標準楷體", serif;
      font-size: 1.6rem;
      font-weight: bold;
      margin: 10px 0;
      letter-spacing: 3px;
    }

    .card-line {
      width: 70%;
      margin: 18px auto;
      border-top: 1px solid;
      position: relative;
    }
    .card-line::after {
      content: "✦";
      position: absolute;
      top: -9px;
      left: 50%;
      transform: translateX(-50%);
      padding: 0 10px;
      font-size: 12px;
    }

    .card-age { font-size: 1rem; color: #475569; margin: 6px 0; }
    .level-text { font-weight: bold; font-size: 1.1rem; letter-spacing: 2px; color: #475569; }

    .detail-box {
      padding: 12px;
      border-radius: 6px;
      margin-top: 20px;
      font-size: 0.9rem;
      color: #334155;
      line-height: 1.6;
      text-align: left;
    }
  </style>
</head>
<body>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <h1>會員表揚卡</h1>

  <div id="app" class="container">
    
    <div class="form-section">
      <h2>填寫資料</h2>
      
      <div class="form-group">
        <label for="member-name">會員姓名：</label>
        <input type="text" id="member-name" v-model.trim="name" placeholder="請輸入姓名">
      </div>

      <div class="form-group">
        <label for="member-age">會員年齡 (0-100歲)：</label>
        <input 
          type="number" 
          id="member-age" 
          v-model.number="age" 
          min="0" 
          max="100" 
          @input="checkAge"
          placeholder="請輸入年齡"
        >
      </div>

      <div class="form-group">
        <label for="member-level">會員等級：</label>
        <select id="member-level" v-model="level">
          <option value="銅牌會員">銅牌會員</option>
          <option value="銀牌會員">銀牌會員</option>
          <option value="金牌會員">金牌會員</option>
        </select>
      </div>

      <div class="form-group">
        <label for="member-img">頭像圖片網址：</label>
        <input type="text" id="member-img" v-model="imgUrl" placeholder="請貼上網址（必填）">
      </div>

      <!-- ✨ 修正：加上了 class="checkbox-label" 讓樣式獨立排隊 -->
      <div class="form-group">
        <label for="chk-detail" class="checkbox-label">
          <input type="checkbox" id="chk-detail" v-model="showDetail"> 顯示詳細資料
        </label>
      </div>

      <!-- ✨ 修正：加上了 class="checkbox-label" 讓樣式獨立排隊 -->
      <div class="form-group">
        <label for="chk-vip" class="checkbox-label">
          <input type="checkbox" id="chk-vip" v-model="isVip"> 啟用 VIP 模式
        </label>
      </div>
    </div>

    <div class="preview-section">
      <h2>表揚卡預覽</h2>
      
      <!-- 💡 這裡將等級和 VIP 同時用陣列模式綁定到 class 上 -->
      <div class="invite-card" :class="[level, { vip: isVip }]" v-if="name">
        
        <img v-if="imgUrl" :src="imgUrl" class="avatar" alt="會員頭像">
        
        <div class="card-name">{{ name }}</div>
        
        <div class="card-line"></div>
        
        <p class="card-age">誠摯表揚 {{ age }} 歲貴賓</p>
        
        <p class="level-text">{{ level }}</p>
        
        <div class="detail-box" v-show="showDetail">
          尊貴的閣下您好：<br>
          歡迎您成為本會尊榮的 <strong>{{ level }}</strong>，期待您的光臨，與我們共創精彩的一天。
        </div>

      </div>
      
      <p v-else class="hint-text">
        ~ 填寫左側「會員姓名」後，即可鑄造專屬華麗會員卡 ~
      </p>
    </div>

  </div>

  <script>
    const { createApp, ref } = Vue;

    const app = createApp({
      setup() {
        const name = ref('');
        const age = ref('');
        const level = ref('銅牌會員');
        const imgUrl = ref(''); 
        const showDetail = ref(false);
        const isVip = ref(false);

        
        const checkAge = () => {
          if (age.value === '' || age.value === null) return;
          
          // 1. 去除小數點
          age.value = Math.floor(age.value);
          
          // 2. 太小就變 0
          if (age.value < 0) {
            age.value = 0;
          }
          
          // 3. 太大就變 100
          if (age.value > 100) {
            age.value = 100;
          }
        };

        return {
          name,
          age,
          level,
          imgUrl,
          showDetail,
          isVip,
          checkAge
        };
      },
    });

    app.mount('#app');
  </script>
</body>
</html>
